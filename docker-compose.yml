version: '3.8'
services:
  mongodb:
    image: mongo:7
    container_name: resqnet-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  backend:
    build: ./backend
    container_name: resqnet-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/disastermgmt
      - JWT_SECRET=resqnet_super_secret_key
      - PORT=5000
      - NODE_ENV=development
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: resqnet-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongodata: